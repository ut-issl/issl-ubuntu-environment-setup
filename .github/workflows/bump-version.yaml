name: Bump Version

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:

  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - id: bump-version
        uses: conjikidow/bump-version-action@7e121680654e60966406d6b73861493633ef24fe # v3.1.1
        with:
          label-major: 'update::major'
          label-minor: 'update::minor'
          label-patch: 'update::patch'
          manual-bump-type: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump_type || '' }}
          labels-to-add: 'automated,versioning'
          create-release: 'false'

      - name: Prepare release asset
        if: steps.bump-version.outputs.version-bumped == 'true'
        run: |
          mkdir -p release-assets
          cp scripts/setup.sh release-assets/setup.sh

      - name: Create GitHub release
        if: steps.bump-version.outputs.version-bumped == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ steps.bump-version.outputs.new-version }}
        run: |
          gh release create "${RELEASE_TAG}" release-assets/setup.sh \
            --title "${RELEASE_TAG}" \
            --generate-notes
