name: Test

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/test.yaml
      - assets/**
      - flake.nix
      - flake.lock
      - home-modules/**
      - packages/**
      - profiles/**
      - scripts/apply.sh
      - tests/**
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/test.yaml
      - assets/**
      - flake.nix
      - flake.lock
      - home-modules/**
      - packages/**
      - profiles/**
      - scripts/apply.sh
      - tests/**

permissions:
  contents: read

jobs:
  install:
    name: Test apply.sh
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare test environment
        id: test-env
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          {
            echo "profile_path=${tmpdir}/profile"
            echo "home_dir=${tmpdir}/home"
            echo "config_dir=${tmpdir}/home/.config"
            echo "data_dir=${tmpdir}/home/.local/share"
            echo "state_dir=${tmpdir}/home/.local/state"
          } >> "$GITHUB_OUTPUT"

      - name: Run apply.sh
        shell: bash
        env:
          PROFILE_PATH: ${{ steps.test-env.outputs.profile_path }}
          HOME_DIR: ${{ steps.test-env.outputs.home_dir }}
          CONFIG_DIR: ${{ steps.test-env.outputs.config_dir }}
          DATA_DIR: ${{ steps.test-env.outputs.data_dir }}
          STATE_DIR: ${{ steps.test-env.outputs.state_dir }}
        run: |
          env \
            HOME="${HOME_DIR}" \
            USER="issl-test" \
            XDG_CONFIG_HOME="${CONFIG_DIR}" \
            XDG_DATA_HOME="${DATA_DIR}" \
            XDG_STATE_HOME="${STATE_DIR}" \
            NIX_PROFILE_PATH="${PROFILE_PATH}" \
            GIT_USER_NAME="ISSL Test User" \
            GIT_USER_EMAIL="issl-test@example.com" \
            bash ./scripts/apply.sh

      - name: Test git setup
        shell: bash
        env:
          PROFILE_PATH: ${{ steps.test-env.outputs.profile_path }}
          HOME_DIR: ${{ steps.test-env.outputs.home_dir }}
          CONFIG_DIR: ${{ steps.test-env.outputs.config_dir }}
        run: ./tests/test-git.sh

      - name: Test uv setup
        shell: bash
        env:
          PROFILE_PATH: ${{ steps.test-env.outputs.profile_path }}
        run: ./tests/test-uv.sh
