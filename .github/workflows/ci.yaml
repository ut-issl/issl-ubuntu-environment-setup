name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:

  determine-changes:
    name: Determine changed files
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.changed-files.outputs.workflow_any_changed }}
      workflow_ci: ${{ steps.changed-files.outputs.workflow_ci_any_changed }}
      renovate_config: ${{ steps.changed-files.outputs.renovate_config_any_changed }}
      nix: ${{ steps.changed-files.outputs.nix_any_changed }}
      shell: ${{ steps.changed-files.outputs.shell_any_changed }}
      md: ${{ steps.changed-files.outputs.md_any_changed }}
      json5: ${{ steps.changed-files.outputs.json5_any_changed }}
      json5_files: ${{ steps.changed-files.outputs.json5_all_changed_files }}
      toml: ${{ steps.changed-files.outputs.toml_any_changed }}
      yaml: ${{ steps.changed-files.outputs.yaml_any_changed }}
      python: ${{ steps.changed-files.outputs.python_any_changed }}

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files_yaml: |
            workflow:
              - .github/workflows/**
            workflow_ci:
              - .github/workflows/ci.yaml
            renovate_config:
              - .github/renovate.json5
            nix:
              - '**/*.nix'
              - flake.lock
            shell:
              - '**/*.sh'
              - '**/*.bash'
              - '**/*.zsh'
            md:
              - '**/*.md'
              - .markdownlint-cli2.yaml
            json5:
              - '**/*.json5'
            toml:
              - '**/*.toml'
              - .taplo.toml
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - .yamllint.yaml
            python:
              - '**/*.py'
              - pyproject.toml
              - .python-version
              - uv.lock
              - .ruff.toml

  lint-gh-actions:
    name: Lint GitHub Actions
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        if: github.event_name != 'pull_request'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color

      - name: Run actionlint (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          version: 'v1.24.1'
          advanced-security: false  # must be false for private repo

  validate-renovate-config:
    name: Validate Renovate config
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.renovate_config == 'true' ||
      needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Validate Renovate config
        run: |
          npx --yes --package renovate@43.113.0 \
            renovate-config-validator .github/renovate.json5

  lint-nix:
    name: Lint Nix
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.nix == 'true' || needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run statix
        run: nix run nixpkgs#statix -- check .

      - name: Run deadnix
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Run flake check
        run: |
          if [ -f flake.nix ]; then
            nix flake check --show-trace
          else
            echo "No flake.nix found. Skipping flake check."
          fi

  lint-shell-scripts:
    name: Lint Shell Scripts
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.shell == 'true' || needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            sudo apt-get install -y shellcheck
          fi

      - name: Collect shell scripts
        id: shell-files
        shell: bash
        run: |
          shell_files_path="$(mktemp)"
          find . -type f \( \
            -name '*.sh' -o \
            -name '*.bash' -o \
            -name '*.zsh' \
          \) -not -path './.git/*' -print0 > "${shell_files_path}"
          echo "shell_files=${shell_files_path}" >> "$GITHUB_OUTPUT"
          if [ ! -s "${shell_files_path}" ]; then
            echo "No shell scripts found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run shfmt
        if: steps.shell-files.outputs.found == 'true'
        shell: bash
        env:
          SHELL_FILES: ${{ steps.shell-files.outputs.shell_files }}
        run: |
          xargs -0 shfmt --diff --simplify -i 2 < "${SHELL_FILES}"

      - name: Run shellcheck
        if: github.event_name != 'pull_request' && steps.shell-files.outputs.found == 'true'
        shell: bash
        env:
          SHELL_FILES: ${{ steps.shell-files.outputs.shell_files }}
        run: |
          xargs -0 shellcheck --external-sources < "${SHELL_FILES}"

      - name: Run shellcheck (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1.32.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error

  lint-markdown:
    name: Lint Markdown
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.md == 'true' || needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint Markdown
        if: github.event_name != 'pull_request'
        run: npx --yes markdownlint-cli2@0.22.0 .

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint Markdown (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          markdownlint_rc=0
          npx --yes markdownlint-cli2@0.22.0 . > /tmp/markdownlint-report.txt 2>&1 || markdownlint_rc=$?
          reviewdog_rc=0
          reviewdog < /tmp/markdownlint-report.txt \
              -efm="%f:%l:%c %m" \
              -efm="%f:%l %m" \
              -name=markdownlint \
              -reporter=github-pr-review \
              -fail-level=error || reviewdog_rc=$?
          if [ $markdownlint_rc -ne 0 ] && ! grep -Eq '^[^:]+:[0-9]+(:[0-9]+)? ' /tmp/markdownlint-report.txt; then
            echo "::error title=markdownlint::markdownlint failed before producing parseable diagnostics"
            exit $markdownlint_rc
          fi
          exit $reviewdog_rc

  lint-json5:
    name: Lint JSON5
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.json5 == 'true' || needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check JSON5 syntax
        env:
          CHANGED_JSON5_FILES: ${{ needs.determine-changes.outputs.json5_files }}
        run: |
          readarray -t json5_files < <(
            printf '%s\n' "${CHANGED_JSON5_FILES}" | tr ' ' '\n' | sed '/^$/d'
          )
          if [ ${#json5_files[@]} -eq 0 ]; then
            readarray -d '' -t json5_files < <(
              find . -type f -name '*.json5' -not -path './.git/*' -print0
            )
          fi
          if [ ${#json5_files[@]} -eq 0 ]; then
            echo 'No JSON5 files found.'
            exit 0
          fi
          npx --yes json5@2.2.3 "${json5_files[@]}" >/dev/null

  lint-toml:
    name: Lint TOML
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.toml == 'true' || needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Taplo
        env:
          TAPLO_VERSION: '0.10.0'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gzip -d > "$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/taplo"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check TOML format
        run: taplo fmt --check

      - name: Lint TOML
        run: taplo lint

  lint-yaml:
    name: Lint YAML
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.yaml == 'true' || needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        if: github.event_name != 'pull_request'
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: '0.11.7'

      - name: Lint YAML
        if: github.event_name != 'pull_request'
        run: uvx --from "yamllint==1.38.0" yamllint .

      - name: Lint YAML (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-yamllint@f01d8a48fd8d89f89895499fca2cff09f9e9e8c0 # v1.21.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          yamllint_flags: .

  lint-python:
    name: Lint Python
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.python == 'true' || needs.determine-changes.outputs.workflow_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: '0.11.7'

      - name: Lint with Ruff
        if: github.event_name != 'pull_request'
        run: uvx --from "ruff==0.15.10" ruff check . --output-format=github

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint with Ruff (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff_rc=0
          uvx --from "ruff==0.15.10" ruff check . --output-format=json > /tmp/ruff-report.json || ruff_rc=$?
          reviewdog_rc=0
          jq -c '
            .[] |
            {
              source: {name: "ruff"},
              severity: "ERROR",
              message: (.message + " (" + .code + ")"),
              location: {
                path: .filename,
                range: {
                  start: {line: .location.row, column: .location.column},
                  end: {
                    line: (.end_location.row // .location.row),
                    column: (.end_location.column // .location.column)
                  }
                }
              }
            }
          ' /tmp/ruff-report.json > /tmp/ruff-rdjsonl.txt || true
          reviewdog < /tmp/ruff-rdjsonl.txt \
              -f=rdjsonl \
              -name=ruff \
              -reporter=github-pr-review \
              -fail-level=error \
              -tee || reviewdog_rc=$?
          if [ $ruff_rc -ne 0 ] && [ ! -s /tmp/ruff-rdjsonl.txt ]; then
            echo "::error title=ruff::ruff failed before producing diagnostics for reviewdog"
            exit $ruff_rc
          fi
          exit $reviewdog_rc

  check-prek:
    name: Check prek
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check prek
        uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2.0.2
        with:
          prek-version: 'v0.3.9'
          extra-args: '--all-files --skip no-commit-to-branch'

  check-typos:
    name: Check typos
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check spelling
        if: github.event_name != 'pull_request'
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1
        with:
          files: |
            .
            .github/**

      - name: Check spelling (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-typos@d5eb1bbcd1b3bfde596f6eeb470322727862fe98 # v1.19.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          typos_flags: --hidden .

  lint-commit-messages:
    name: Lint commit messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Commitizen
        uses: commitizen-tools/setup-cz@7247d00792cbaf3408d7f8d2c6a010ca3b40c10e # v0.9.0
        with:
          python-version: '3.x'
          version: '4.13.10'

      - name: Lint commit messages on push
        if: github.event_name == 'push'
        run: cz check --rev-range ${{ github.event.before }}..${{ github.sha }}

      - name: Lint commit messages on pull request
        if: github.event_name == 'pull_request'
        run: cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
